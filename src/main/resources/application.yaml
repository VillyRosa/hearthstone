spring:
  application:
    name: hearthstone

  datasource:
    url: jdbc:h2:file:./data/hearthstone
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
